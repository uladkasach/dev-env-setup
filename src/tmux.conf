# tmux config for ductwork
# prefix: ctrl+x (instead of ctrl+b)
set -g prefix C-x
unbind C-b
bind C-x send-prefix

# mouse ON so tmux owns the wheel: wheel-up enters copy-mode and scrolls the 50k
# scrollback natively (no more kitty alternate_scroll that fakes arrow keys at the
# prompt). the catch this used to cause — tmux pulled left-drag into copy-mode,
# so a highlight vanished on release — is handled on the kitty side: kitty's
# mouse_map claims left-drag for its OWN selection even while tmux holds the mouse
# grab (see install_env.pt4.terminal.kitty.sh), so the highlight sticks and ctrl+c
# still copies + toasts + forwards. net: kitty owns selection (left button), tmux
# owns scroll (wheel) — both native, no modifier. tmux only forfeits left-CLICK
# pane ops (focus/resize/status-click), unused here since it runs one pane per
# window.
set -g mouse on

# increase scrollback buffer
set -g history-limit 50000

######################################################################
# status line: repo on the left, branch on the right
######################################################################
# the shell (_set_terminal_title in zshrc) already computes $repo and $branch as
# separate values. inside tmux it pushes them straight to these pane options, so
# tmux just reads them — no string parse, no git subprocess on a status refresh.
# (tmux reserves ':' as its own separator inside #{s/.../.../}, so a re-split of a
# "repo:branch" string here is impossible; separate options sidestep that entirely.)
# @repo/@branch are empty until the shell sets them (fresh pane, non-git dir).
set -g status-left  " #{@repo} "
set -g status-right " #{@branch} "
set -g status-left-length 40
set -g status-right-length 60

# blank the middle window-status list (the "0:zsh*" index:name+flags segment) —
# with one tmux window per duct it is just noise; the kitty tabs are the real
# window switcher. this leaves the status line as: repo (left) ... branch (right).
set -g window-status-format ""
set -g window-status-current-format ""

# allow kitty graphics protocol passthrough (for image.nvim to render pngs in nvim)
set -gq allow-passthrough on
set -g visual-activity off
set-option -g focus-events on

######################################################################
# clipboard: relay the kitty keyboard protocol + clipboard through tmux
######################################################################
# without this, kitty -> tmux -> nvim copy is dead. the copy path (kitty's
# copy_notify.py) forwards ctrl+shift+c as CSI 99;6u only when the child app has
# the kitty keyboard protocol on, and nvim yanks on <C-S-c> (not the ^C byte).
# with tmux in the middle, kitty's child is tmux — so tmux must relay nvim's
# protocol request upward (to unblock the kitten's forward gate) AND deliver the
# extended key downward to nvim. extended-keys is the critical line.
# (requires tmux >= 3.2; these are server options — apply live with
#  `tmux source-file ~/.tmux.conf`, then detach+reattach so the client
#  re-negotiates terminal-features. no server kill needed.)
set -s extended-keys on
set -as terminal-features 'xterm-kitty:extkeys'

# route OSC 52 clipboard writes (nvim's + register) out through kitty to the
# system clipboard, so a yank inside tmux lands on the desktop clipboard.
set -s set-clipboard on
set -as terminal-features 'xterm-kitty:clipboard'

######################################################################
# force-reboot the duct's pane (ctrl+shift+r)
######################################################################
# hard-reboot whatever runs in the active pane — SIGKILL it (e.g. a wedged nvim
# that will not :q) and respawn a fresh login shell at the same pwd. the duct
# (this tmux session) and the attached kitty tab both survive; you just land at
# a clean prompt in the same directory.
# - works even when nvim is fully hung: tmux kills the pane process from the
#   OUTSIDE, so it needs no keystroke that a stuck nvim would fail to read.
# - -k kills the current process; -c "#{pane_current_path}" reopens at its cwd.
# - the fresh shell is a plain login shell in the duct; it re-attaches no state.
# bound as a root (no-prefix) key, so it fires from any app in the session. this
# is only unambiguous because extended-keys (above) lets tmux tell ctrl+shift+r
# from ctrl+r — without it the two would collide. the tradeoff: apps in the
# session (incl. nvim) never see ctrl+shift+r, which is fine (nvim does not use it).
bind -n C-S-r respawn-pane -k -c "#{pane_current_path}"

######################################################################
# plugins (via tpm)
######################################################################

# plugin manager
set -g @plugin 'tmux-plugins/tpm'

# resurrect: save/restore sessions across restarts
# prefix + ctrl+s to save, prefix + ctrl+r to restore
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'

# continuum: auto-save every 15min, auto-restore on tmux start
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# init tpm (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
